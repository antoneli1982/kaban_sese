<!-- 🔄 AUTO-ATUALIZAÇÃO: ao subir uma versão nova, troque APP_VERSION.  -->
<!-- Ao detectar versão nova, remove service worker + cache antigos     -->
<!-- UMA vez e recarrega, para todos verem a versão atual sem limpar    -->
<!-- nada manualmente. Evita o app ficar preso numa versão em cache.    -->
<!-- ============================================================ -->
<script>
(function () {
  var APP_VERSION = '2026-07-5w2h-3'; // <-- troque esta string a cada nova publicação
  try {
    if (localStorage.getItem('__kanban_ver') === APP_VERSION) return;
    localStorage.setItem('__kanban_ver', APP_VERSION); // marca antes de tudo (roda só 1x por versão)
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.getRegistrations()
      .then(function (regs) { return Promise.all(regs.map(function (r) { return r.unregister(); })); })
      .then(function () {
        if (window.caches && caches.keys) {
          return caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          });
        }
      })
      .then(function () { location.reload(); })
      .catch(function () {});
  } catch (e) {}
})();
</script>

<script>

    try {
      var t = localStorage.getItem('kanban-theme') || 'blue';
      document.documentElement.setAttribute('data-theme', t);
      var c = { blue: '#3b5cff', green: '#10b981', black: '#000000' }[t] || '#3b5cff';

<body>
<div id="root">
  <!-- Rede de segurança: aparece enquanto o app carrega. Se o React/Babel não carregarem
       (sem internet, firewall bloqueando os CDNs), esta mensagem fica visível em vez de tela preta. -->
  <div id="boot-fallback" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;font-family:'Poppins',-apple-system,sans-serif;color:#a1a1aa;">
    <div style="width:22px;height:22px;border:2px solid #27272a;border-top-color:#3b5cff;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <div style="font-size:14px;">Carregando o Kanban…</div>
    <div id="boot-msg" style="font-size:12px;color:#71717a;max-width:360px;line-height:1.55;"></div>
  </div>
</div>

<script>
  // Se o app não montar em alguns segundos, mostra uma mensagem útil (em vez de ficar preto).
  window.addEventListener('error', function () {
    var msg = document.getElementById('boot-msg');
    if (msg && document.getElementById('boot-fallback')) {
      msg.textContent = 'Erro ao carregar. Verifique a conexão com a internet e abra o console (F12) para ver o detalhe.';
    }
  }, true);
  setTimeout(function () {
    if (document.getElementById('boot-fallback')) {
      var msg = document.getElementById('boot-msg');
      if (msg) msg.innerHTML = 'Não foi possível carregar o app. Isso quase sempre é falta de internet ou um firewall bloqueando os scripts (unpkg.com / gstatic.com).<br><br>Dica: rode por um servidor local em vez de abrir o arquivo direto. Ex.: <code>python -m http.server</code>';
    }
  }, 8000);
</script>

<!-- 📱 PWA: Service Worker + Botão de instalação                  -->

<script>
  // Registra o service worker (somente em produção, em HTTPS ou localhost)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('SW registration failed:', err);
      });
    });
  }

  // Captura o evento beforeinstallprompt (Android/Chrome)
  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    window.__canInstallApp = true;
    window.dispatchEvent(new Event('pwa-installable'));
  });

  window.installPWA = async () => {
    if (!deferredInstallPrompt) return false;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    window.__canInstallApp = false;
    return outcome === 'accepted';
  };

  // Aviso quando instalado
  window.addEventListener('appinstalled', () => {
    window.__canInstallApp = false;
    console.log('Kanban SESE instalado como aplicativo.');
  });
</script>
